<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>job-finding-AI-Agent 配置生成器</title>
    <link rel="stylesheet" href="/static/css/common.css" />
  </head>
  <body class="page-enter">
    <div class="wrap">
      <div class="header">
        <div class="header-main">
          <div class="iconTitle" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3" />
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
            </svg>
          </div>
          <div>
            <div class="title">配置生成器（.env）</div>
            <div class="subtitle">仅用于本机：填写后写入项目根目录 <code>.env</code></div>
          </div>
        </div>
      </div>
      <div class="notice" role="status">
        <span class="notice__icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
        </span>
        <span>
          该页面与保存接口默认只允许 <strong>127.0.0.1 / localhost</strong> 访问。请勿截图泄露密钥。<br />
          保存成功后需要<strong>重启服务</strong>才会生效。
        </span>
      </div>

      <div class="actions">
        <button type="button" id="btnSave">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
            <path d="M17 21v-8H7v8M7 3v5h8" />
          </svg>
          保存到 .env
        </button>
        <button type="button" class="secondary" id="btnFillDefaults">填入默认值</button>
        <button type="button" class="secondary" id="btnClear">清空所有输入</button>
        <span id="status" class="status"></span>
      </div>

      <div id="app" class="grid grid--1 mt-4"></div>

      <div class="footer">
        接口：<code>GET /api/config/env_schema</code>，<code>POST /api/config/write_env</code>。
      </div>
    </div>

    <script>
      const state = {
        schema: null,
        inputs: new Map(),
      };

      function el(tag, attrs = {}, children = []) {
        const node = document.createElement(tag);
        Object.entries(attrs).forEach(([k, v]) => {
          if (k === "class") node.className = v;
          else if (k === "text") node.textContent = v;
          else node.setAttribute(k, v);
        });
        children.forEach((c) => node.appendChild(c));
        return node;
      }

      function setStatus(msg, kind = "") {
        const s = document.getElementById("status");
        s.textContent = msg || "";
        s.className = "status" + (kind ? " " + kind : "");
      }

      function groupFields(fields) {
        const map = new Map();
        fields.forEach((f) => {
          const g = f.group || "默认";
          if (!map.has(g)) map.set(g, []);
          map.get(g).push(f);
        });
        return Array.from(map.entries());
      }

      function render(schema) {
        const app = document.getElementById("app");
        app.innerHTML = "";
        state.inputs.clear();

        const groups = groupFields(schema.fields || []);
        groups.forEach(([groupName, fields]) => {
          const card = el("div", { class: "card" });
          card.appendChild(el("h2", { text: groupName }));
          fields.forEach((f) => {
            const row = el("div", { class: "row" });
            const left = el("div");
            left.appendChild(el("div", { class: "k", text: f.key }));
            if (f.help) left.appendChild(el("div", { class: "help", text: f.help }));

            const right = el("div");
            const inputType = f.is_secret ? "password" : "text";
            const input = el("input", {
              type: inputType,
              "data-key": f.key,
              placeholder: f.example || f.default || "",
              value: "",
            });
            state.inputs.set(f.key, input);

            const wrap = el("div", { class: "inputWrap" });
            wrap.appendChild(input);
            if (f.is_secret) {
              const toggle = el("span", { class: "pill", text: "显示/隐藏" });
              toggle.addEventListener("click", () => {
                input.type = input.type === "password" ? "text" : "password";
              });
              wrap.appendChild(toggle);
            }

            right.appendChild(wrap);
            const hintParts = [];
            if (f.default) hintParts.push("默认: " + f.default);
            if (f.example) hintParts.push("示例: " + f.example);
            if (hintParts.length) right.appendChild(el("div", { class: "hint", text: hintParts.join(" | ") }));

            row.appendChild(left);
            row.appendChild(right);
            card.appendChild(row);
          });
          app.appendChild(card);
        });
      }

      async function loadSchema() {
        setStatus("加载 schema 中…");
        const r = await fetch("/api/config/env_schema");
        if (!r.ok) {
          const t = await r.text();
          throw new Error("加载失败: " + r.status + " " + t);
        }
        const schema = await r.json();
        state.schema = schema;
        render(schema);
        setStatus("已加载 .env.example 字段（" + (schema.fields?.length || 0) + " 项）");
      }

      function collectValues() {
        const values = {};
        for (const [key, input] of state.inputs.entries()) {
          values[key] = (input.value || "").trim();
        }
        return values;
      }

      function fillDefaults() {
        if (!state.schema) return;
        state.schema.fields.forEach((f) => {
          const input = state.inputs.get(f.key);
          if (!input) return;
          if (!input.value) input.value = f.default || "";
        });
      }

      function clearAll() {
        for (const input of state.inputs.values()) input.value = "";
      }

      async function saveEnv() {
        const values = collectValues();
        const r = await fetch("/api/config/write_env", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ values, backup: true }),
        });
        const bodyText = await r.text();
        let body = null;
        try {
          body = JSON.parse(bodyText);
        } catch (_) {}
        if (!r.ok) {
          const msg = body?.detail || bodyText || "HTTP " + r.status;
          throw new Error(msg);
        }
        return body;
      }

      document.getElementById("btnFillDefaults").addEventListener("click", () => {
        fillDefaults();
        setStatus("已填入默认值（仅填充空白项）", "ok");
      });
      document.getElementById("btnClear").addEventListener("click", () => {
        clearAll();
        setStatus("已清空输入", "ok");
      });
      document.getElementById("btnSave").addEventListener("click", async () => {
        setStatus("写入 .env 中…");
        try {
          const res = await saveEnv();
          setStatus("写入成功： " + res.env_path + "（写入 " + (res.written_keys?.length || 0) + " 项）", "ok");
        } catch (e) {
          setStatus("写入失败：" + (e?.message || String(e)), "err");
        }
      });

      loadSchema().catch((e) => setStatus(e.message || String(e), "err"));
    </script>
  </body>
</html>
