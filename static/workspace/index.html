<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>job-finding-AI-Agent</title>
    <style>
      :root {
        --bg: #0b0f19;
        --panel: #121a2a;
        --text: #e7eefc;
        --muted: #a9b6d3;
        --border: #24324d;
        --accent: #5aa7ff;
        --danger: #ff6b6b;
        --ok: #39d98a;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "PingFang SC",
          "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
        background: radial-gradient(1200px 600px at 20% 0%, #132449 0%, var(--bg) 60%);
        color: var(--text);
      }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 18px 60px; }
      .header { display: flex; gap: 14px; align-items: baseline; flex-wrap: wrap; }
      .title { font-size: 22px; font-weight: 900; }
      .subtitle { color: var(--muted); font-size: 13px; }
      .notice {
        margin-top: 14px;
        background: rgba(255, 107, 107, 0.08);
        border: 1px solid rgba(255, 107, 107, 0.35);
        padding: 12px 14px;
        border-radius: 10px;
        color: #ffd6d6;
        font-size: 13px;
        line-height: 1.5;
      }
      .card {
        margin-top: 14px;
        background: rgba(18, 26, 42, 0.92);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }
      .grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
      .row {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 12px;
        padding: 10px 0;
        border-top: 1px solid rgba(36,50,77,0.6);
      }
      .row:first-of-type { border-top: none; }
      .k { font-weight: 800; font-size: 13px; }
      .help { margin-top: 6px; color: var(--muted); font-size: 12px; line-height: 1.45; white-space: pre-wrap; }
      .inputWrap { display: flex; gap: 8px; align-items: flex-start; }
      input[type="text"], input[type="password"] {
        width: 100%;
        background: rgba(9, 13, 22, 0.85);
        border: 1px solid rgba(36,50,77,0.9);
        color: var(--text);
        padding: 10px 10px;
        border-radius: 10px;
        outline: none;
        font-size: 13px;
      }
      input:focus { border-color: rgba(90,167,255,0.9); box-shadow: 0 0 0 3px rgba(90,167,255,0.15); }
      .pill {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid rgba(36,50,77,0.9);
        background: rgba(9, 13, 22, 0.65);
        color: var(--muted);
        font-size: 12px;
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
      }
      .pill:hover { border-color: rgba(90,167,255,0.7); color: var(--text); }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; align-items: center; }
      button {
        background: linear-gradient(180deg, rgba(90,167,255,1) 0%, rgba(49,122,240,1) 100%);
        border: none;
        color: white;
        padding: 10px 12px;
        border-radius: 12px;
        font-weight: 900;
        cursor: pointer;
        font-size: 13px;
      }
      button.secondary {
        background: rgba(9, 13, 22, 0.6);
        border: 1px solid rgba(36,50,77,0.9);
        color: var(--text);
        font-weight: 800;
      }
      .status { font-size: 13px; color: var(--muted); }
      .status.ok { color: var(--ok); }
      .status.err { color: var(--danger); }
      .big {
        width: 100%;
        padding: 14px 14px;
        font-size: 15px;
        border-radius: 14px;
      }
      code { color: #cfe0ff; }
      a { color: var(--accent); text-decoration: none; }
      @media (max-width: 860px) { .row { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="title">job-finding-AI-Agent</div>
        <div class="subtitle">本机工作台：配置 .env → 创建/选择场景 → 自动筛选岗位</div>
      </div>
      <div class="notice">
        所有页面与接口仅允许 <strong>localhost/127.0.0.1</strong> 访问。请勿截图泄露密钥。\n
        保存 .env 后需要重启服务生效。
      </div>

      <div class="card">
        <div class="subtitle">环境配置（来自 <code>.env.example</code>，当前值来自 <code>.env</code>）</div>
        <div class="actions">
          <button id="btnSave">保存 .env</button>
          <button class="secondary" id="btnFillDefaults">填入默认值</button>
          <span id="status" class="status"></span>
        </div>
        <div id="form" class="grid" style="margin-top:10px"></div>
      </div>

      <div class="card">
        <button class="big" id="btnStart">开始自动寻找招聘详情</button>
        <div class="help">点击后进入工作台：创建/选择场景并运行 Agent。</div>
      </div>
    </div>

    <script>
      const state = { schema: null, env: {}, inputs: new Map() };

      function el(tag, attrs = {}, children = []) {
        const node = document.createElement(tag);
        Object.entries(attrs).forEach(([k, v]) => {
          if (k === "class") node.className = v;
          else if (k === "text") node.textContent = v;
          else node.setAttribute(k, v);
        });
        children.forEach((c) => node.appendChild(c));
        return node;
      }

      function setStatus(msg, kind = "") {
        const s = document.getElementById("status");
        s.textContent = msg || "";
        s.className = "status" + (kind ? " " + kind : "");
      }

      function groupFields(fields) {
        const map = new Map();
        fields.forEach((f) => {
          const g = f.group || "默认";
          if (!map.has(g)) map.set(g, []);
          map.get(g).push(f);
        });
        return Array.from(map.entries());
      }

      function render() {
        const container = document.getElementById("form");
        container.innerHTML = "";
        state.inputs.clear();
        const fields = state.schema?.fields || [];
        const groups = groupFields(fields);
        groups.forEach(([groupName, fs]) => {
          const groupCard = el("div", { class: "card" });
          groupCard.appendChild(el("div", { class: "k", text: groupName }));
          fs.forEach((f) => {
            const row = el("div", { class: "row" });
            const left = el("div");
            left.appendChild(el("div", { class: "k", text: f.key }));
            if (f.help) left.appendChild(el("div", { class: "help", text: f.help }));

            const right = el("div");
            const inputType = f.is_secret ? "password" : "text";
            const input = el("input", {
              type: inputType,
              placeholder: f.example || f.default || "",
              value: state.env[f.key] ?? "",
            });
            state.inputs.set(f.key, input);

            const wrap = el("div", { class: "inputWrap" });
            wrap.appendChild(input);
            if (f.is_secret) {
              const toggle = el("span", { class: "pill", text: "显示/隐藏" });
              toggle.addEventListener("click", () => {
                input.type = input.type === "password" ? "text" : "password";
              });
              wrap.appendChild(toggle);
            }
            right.appendChild(wrap);
            row.appendChild(left);
            row.appendChild(right);
            groupCard.appendChild(row);
          });
          container.appendChild(groupCard);
        });
      }

      async function getJson(url) {
        const r = await fetch(url);
        const t = await r.text();
        let j = null;
        try { j = JSON.parse(t); } catch (_) {}
        if (!r.ok) throw new Error(j?.detail || t || ("HTTP " + r.status));
        return j;
      }

      async function loadAll() {
        setStatus("加载配置中…");
        state.schema = await getJson("/api/config/env_schema");
        const env = await getJson("/api/config/read_env");
        state.env = env.values || {};
        render();
        setStatus(env.exists ? "已加载现有 .env（可修改）" : "未检测到 .env：请填写后保存", env.exists ? "ok" : "");
      }

      function fillDefaults() {
        (state.schema?.fields || []).forEach((f) => {
          const input = state.inputs.get(f.key);
          if (!input) return;
          if (!input.value) input.value = f.default || "";
        });
      }

      function collectValues() {
        const values = {};
        for (const [k, input] of state.inputs.entries()) values[k] = (input.value || "").trim();
        return values;
      }

      async function saveEnv() {
        const values = collectValues();
        const r = await fetch("/api/config/write_env", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ values, backup: true }),
        });
        const t = await r.text();
        let j = null;
        try { j = JSON.parse(t); } catch (_) {}
        if (!r.ok) throw new Error(j?.detail || t || ("HTTP " + r.status));
        return j;
      }

      document.getElementById("btnFillDefaults").addEventListener("click", () => {
        fillDefaults();
        setStatus("已填入默认值（仅填充空白项）", "ok");
      });

      document.getElementById("btnSave").addEventListener("click", async () => {
        setStatus("保存中…");
        try {
          const res = await saveEnv();
          setStatus("保存成功：写入 " + (res.written_keys?.length || 0) + " 项（重启生效）", "ok");
        } catch (e) {
          setStatus("保存失败：" + (e?.message || String(e)), "err");
        }
      });

      document.getElementById("btnStart").addEventListener("click", () => {
        location.href = "/workspace";
      });

      loadAll().catch((e) => setStatus("加载失败：" + (e?.message || String(e)), "err"));
    </script>
  </body>
</html>
