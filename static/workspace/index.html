<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>job-finding-AI-Agent</title>
    <link rel="stylesheet" href="/static/css/common.css" />
  </head>
  <body class="page-enter">
    <div class="wrap">
      <div class="header">
        <div class="header-main">
          <div class="iconTitle" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z" />
              <path d="M2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
          </div>
          <div>
            <div class="title">job-finding-AI-Agent</div>
            <div class="subtitle">本机工作台：配置 .env → 创建/选择场景 → 自动筛选岗位</div>
          </div>
        </div>
      </div>
      <div class="notice" role="status">
        <span class="notice__icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 8v4M12 16h.01" />
          </svg>
        </span>
        <span>
          所有页面与接口仅允许 <strong>localhost/127.0.0.1</strong> 访问。请勿截图泄露密钥。<br />
          保存 .env 后需要<strong>重启服务</strong>生效。
        </span>
      </div>

      <div class="card">
        <div class="subtitle">环境配置（来自 <code>.env.example</code>，当前值来自 <code>.env</code>）</div>
        <div class="actions">
          <button type="button" id="btnSave">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
              <path d="M17 21v-8H7v8M7 3v5h8" />
            </svg>
            保存 .env
          </button>
          <button type="button" class="secondary" id="btnFillDefaults">填入默认值</button>
          <span id="status" class="status"></span>
        </div>
        <div id="form" class="grid grid--1 mt-3"></div>
      </div>

      <div class="card">
        <button type="button" class="big" id="btnStart">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
          开始自动寻找招聘详情
        </button>
        <div class="help">点击后进入工作台：创建/选择场景并运行 Agent。</div>
      </div>
    </div>

    <script>
      const state = { schema: null, env: {}, inputs: new Map() };

      function el(tag, attrs = {}, children = []) {
        const node = document.createElement(tag);
        Object.entries(attrs).forEach(([k, v]) => {
          if (k === "class") node.className = v;
          else if (k === "text") node.textContent = v;
          else node.setAttribute(k, v);
        });
        children.forEach((c) => node.appendChild(c));
        return node;
      }

      function setStatus(msg, kind = "") {
        const s = document.getElementById("status");
        s.textContent = msg || "";
        s.className = "status" + (kind ? " " + kind : "");
      }

      function groupFields(fields) {
        const map = new Map();
        fields.forEach((f) => {
          const g = f.group || "默认";
          if (!map.has(g)) map.set(g, []);
          map.get(g).push(f);
        });
        return Array.from(map.entries());
      }

      function render() {
        const container = document.getElementById("form");
        container.innerHTML = "";
        state.inputs.clear();
        const fields = state.schema?.fields || [];
        const groups = groupFields(fields);
        groups.forEach(([groupName, fs]) => {
          const groupCard = el("div", { class: "card card--nested" });
          groupCard.appendChild(el("div", { class: "k", text: groupName }));
          fs.forEach((f) => {
            const row = el("div", { class: "row" });
            const left = el("div");
            left.appendChild(el("div", { class: "k", text: f.key }));
            if (f.help) left.appendChild(el("div", { class: "help", text: f.help }));

            const right = el("div");
            const inputType = f.is_secret ? "password" : "text";
            const input = el("input", {
              type: inputType,
              placeholder: f.example || f.default || "",
              value: state.env[f.key] ?? "",
            });
            state.inputs.set(f.key, input);

            const wrap = el("div", { class: "inputWrap" });
            wrap.appendChild(input);
            if (f.is_secret) {
              const toggle = el("span", { class: "pill", text: "显示/隐藏" });
              toggle.addEventListener("click", () => {
                input.type = input.type === "password" ? "text" : "password";
              });
              wrap.appendChild(toggle);
            }
            right.appendChild(wrap);
            row.appendChild(left);
            row.appendChild(right);
            groupCard.appendChild(row);
          });
          container.appendChild(groupCard);
        });
      }

      async function getJson(url) {
        const r = await fetch(url);
        const t = await r.text();
        let j = null;
        try {
          j = JSON.parse(t);
        } catch (_) {}
        if (!r.ok) throw new Error(j?.detail || t || "HTTP " + r.status);
        return j;
      }

      async function loadAll() {
        setStatus("加载配置中…");
        state.schema = await getJson("/api/config/env_schema");
        const env = await getJson("/api/config/read_env");
        state.env = env.values || {};
        render();
        setStatus(env.exists ? "已加载现有 .env（可修改）" : "未检测到 .env：请填写后保存", env.exists ? "ok" : "");
      }

      function fillDefaults() {
        (state.schema?.fields || []).forEach((f) => {
          const input = state.inputs.get(f.key);
          if (!input) return;
          if (!input.value) input.value = f.default || "";
        });
      }

      function collectValues() {
        const values = {};
        for (const [k, input] of state.inputs.entries()) values[k] = (input.value || "").trim();
        return values;
      }

      async function saveEnv() {
        const values = collectValues();
        const r = await fetch("/api/config/write_env", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ values, backup: true }),
        });
        const t = await r.text();
        let j = null;
        try {
          j = JSON.parse(t);
        } catch (_) {}
        if (!r.ok) throw new Error(j?.detail || t || "HTTP " + r.status);
        return j;
      }

      document.getElementById("btnFillDefaults").addEventListener("click", () => {
        fillDefaults();
        setStatus("已填入默认值（仅填充空白项）", "ok");
      });

      document.getElementById("btnSave").addEventListener("click", async () => {
        setStatus("保存中…");
        try {
          const res = await saveEnv();
          setStatus("保存成功：写入 " + (res.written_keys?.length || 0) + " 项（重启生效）", "ok");
        } catch (e) {
          setStatus("保存失败：" + (e?.message || String(e)), "err");
        }
      });

      document.getElementById("btnStart").addEventListener("click", () => {
        location.href = "/workspace";
      });

      loadAll().catch((e) => setStatus("加载失败：" + (e?.message || String(e)), "err"));
    </script>
  </body>
</html>
